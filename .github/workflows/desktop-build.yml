name: desktop-build

on:
  workflow_dispatch:
  push:
    paths:
      - 'desktop-app/**'

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: desktop-app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install
        run: npm ci

      - name: Build
        run: npm run dist

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: abkosystem-desktop-windows
          path: |
            desktop-app/dist/*.exe
            desktop-app/dist/*.zip
            desktop-app/dist/latest*.yml

