<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ABKO 고객지원 - 현황 확인</title>
    <link rel="stylesheet" href="./_style.css" />
    <style>
      :root{ --pageMax: 460px; }
      body{ background: var(--bg); }

      .page{ max-width: var(--pageMax); margin: 0 auto; padding: 0 14px 40px; }

      /* 브랜드 고정 헤더 (AS 접수 스타일) */
      .brandHeader{ position:sticky; top:0; z-index:20; background: rgba(242,244,247,.95); backdrop-filter:blur(8px); padding:12px 0 0; }
      .brandHeaderRow{ display:grid; grid-template-columns:38px 1fr 38px; align-items:center; padding:0 14px; }
      .brandHeader .bTitle{ margin:0; font-size:18px; font-weight:900; letter-spacing:-.5px; text-align:center; }
      .back{ width:38px; height:38px; border-radius:12px; border:1px solid var(--line); background:#fff; display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:16px; }
      .back:active{ transform:translateY(1px); }

      .progressWrap{ margin-top:8px; padding: 0 14px 10px; }
      .progress{ height:6px; background:#eaf0f7; border-radius:999px; overflow:hidden; border:1px solid var(--line); }
      .bar{ height:100%; width:0%; background: var(--accent); border-radius:999px; transition: width .25s ease; }

      .stage{ display:none; }
      .stage.active{ display:block; }

      label{ font-size:14px; }
      label.req{ font-weight:900; color:var(--text); }

      .card{ background:#fff; border:1px solid var(--line); border-radius:18px; padding:16px; box-shadow: var(--shadow); }
      .stack{ display:grid; gap:12px; margin-top:14px; }

      .inline{ display:flex; gap:8px; align-items:center; width:100%; }
      .prefix{ padding:10px 10px; background:#f3f4f6; border:1px solid var(--line); border-radius:10px; font-size:15px; font-weight:700; white-space:nowrap; color:var(--text); }
      .inline input{ flex:1 1 auto; min-width:0; }

      .btnSquare{ flex:0 0 72px; width:72px; height:44px; border-radius:12px; display:flex; align-items:center; justify-content:center; font-weight:900; white-space:nowrap; line-height:1; padding:0; }
      .btnSquare.mint{ background: var(--accent); border-color: var(--accent); color:#fff; }
      .btnSquare.mint:active{ transform: translateY(1px); }
      .hiMint{ border-color: rgba(0,194,179,.7) !important; box-shadow: 0 0 0 2px rgba(0,194,179,.12); }
      .hiMintBg{ background: rgba(0,194,179,.08); }

      .spinner{ width:18px; height:18px; border:2px solid rgba(17,24,39,.18); border-top-color: rgba(17,24,39,.55); border-radius:999px; animation: spin .9s linear infinite; }
      @keyframes spin{ to{ transform:rotate(360deg);} }

      .ticketBtns{ display:flex; gap:8px; flex-wrap:wrap; }
      .ticketBtn{ width:100%; display:flex; align-items:center; justify-content:space-between; gap:8px; padding:10px 12px; border-radius:14px; border:1px solid var(--line); background:#fff; cursor:pointer; box-shadow: var(--shadow); }
      .ticketBtn strong{ font-size:13px; }
      .ticketBtn span{ font-size:12px; color:var(--muted); }

      /* detail 상단 티켓 탭(가로 스크롤) */
      .tabs{ display:flex; gap:8px; overflow-x:auto; padding: 0 14px 10px; -webkit-overflow-scrolling:touch; }
      .tabs::-webkit-scrollbar{ display:none; }
      .tab{ flex:0 0 auto; padding:10px 12px; border-radius:14px; border:1px solid var(--line); background:#fff; cursor:pointer; }
      .tab.active{ border:none; background: var(--accent); color:#fff; box-shadow:none; }
      .tab:focus{ outline:none; }
      .tab strong{ display:block; font-size:13px; }
      .tab span{ display:block; margin-top:2px; font-size:12px; color:var(--muted); }
      .tab.active span{ color: rgba(255,255,255,.9); }

      .kv{ display:grid; gap:10px; }
      .kvRow{ display:grid; grid-template-columns: 92px 1fr; gap:10px; }
      .k{ color:var(--muted); font-size:14px; font-weight:800; }
      .v{ font-size:15px; font-weight:700; }

      .items{ margin-top:12px; display:grid; gap:10px; }
      .it{ border:1px solid var(--line); border-radius:14px; padding:12px; background:#fff; }
      .it{ cursor:pointer; transition: transform .12s ease, box-shadow .12s ease; }
      .it.open{ box-shadow: 0 6px 16px rgba(17,24,39,.10); transform: translateY(-1px); }
      .itTop{ display:flex; justify-content:space-between; gap:10px; }
      .itTop strong{ font-size:14px; }
      .itTop span{ font-size:13px; color:var(--muted); font-weight:800; }
      .itSym{ margin-top:6px; color:var(--muted); font-size:13px; line-height:1.45; }

      .itDetail{ display:none; margin-top:12px; padding-top:12px; border-top:1px solid var(--line); }
      .it.open .itDetail{ display:block; }
      .itDetail .row2{ display:grid; gap:10px; }
      .itDetail .kvRow{ display:grid; grid-template-columns: 92px 1fr; gap:10px; }

      .sumCard{ display:none; }

      .itStatus{ display:inline-flex; align-items:center; padding:6px 10px; border-radius:999px; font-size:12px; font-weight:900; background: rgba(0,194,179,.10); color: #0f766e; border:1px solid rgba(0,194,179,.25); }

      .empty{ margin-top:10px; color:var(--muted); font-size:13px; }

      /* detail actions */
      .detailActions{ position:fixed; left:0; right:0; bottom:0; background: var(--bg); padding:12px 0 14px; display:none; }
      .detailActionsInner{ max-width: var(--pageMax); margin:0 auto; padding:0 14px; display:flex; gap:10px; }
      .detailActionsInner .btnWide{ flex:1; }

      /* edit modal */
      .full{ position:fixed; inset:0; display:none; background: var(--bg); z-index: 50; }
      .full.show{ display:flex; flex-direction:column; }
      .fullPage{ max-width: var(--pageMax); margin:0 auto; padding: 12px 14px 120px; overflow-y:auto; flex:1; -webkit-overflow-scrolling:touch; }
      .fullCta{ position:fixed; left:0; right:0; bottom:0; background: var(--bg); padding:12px 0 14px; }
      .fullCtaInner{ max-width: var(--pageMax); margin:0 auto; padding:0 14px; display:flex; gap:10px; }
      .fullCtaInner .btnWide{ flex:1; }

      .item{ background:#fff; border:1px solid var(--line); border-radius:18px; padding:14px; box-shadow: var(--shadow); }
      .itemTop{ display:flex; gap:10px; align-items:flex-start; }
      .itemHeaderRow{ display:flex; align-items:baseline; justify-content:space-between; gap:10px; }
      .itemName{ overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
      .itemQty{ flex:0 0 auto; font-size:13px; color:var(--muted); font-weight:800; }
      .itemMeta{ margin-top:6px; color:var(--muted); font-size:13px; line-height:1.4; }
      .itemActions{ margin-left:auto; display:flex; flex-direction:column; gap:8px; }
      .iconBtn{ width:38px; height:38px; border-radius:12px; border:1px solid var(--line); background:#fff; color:#374151; display:flex; align-items:center; justify-content:center; cursor:pointer; }
      .iconBtn svg{ width:18px; height:18px; fill: currentColor; }
      .iconBtn.danger{ color: var(--bad); }
    </style>
  </head>
  <body>
    <div class="brandHeader">
      <div class="brandHeaderRow">
        <button id="backBtn" class="back" type="button" aria-label="뒤로">←</button>
        <h1 class="bTitle">ABKO 고객지원</h1>
        <div></div>
      </div>
      <div class="progressWrap">
        <div class="progress"><div id="bar" class="bar"></div></div>
      </div>
    </div>

    <!-- tabs row (detail only) -->
    <div id="tabs" class="tabs" style="display:none;"></div>

    <div class="page">
      <!-- step 1: phone -->
      <section id="stPhone" class="stage active">
        <div class="stack">
          <div class="card">
            <div class="kv">
              <div>
                <div style="font-size:18px; font-weight:900; letter-spacing:-.5px;">현황 확인</div>
                <div class="muted" style="margin-top:6px; font-size:13px;">휴대폰 번호로 진행 중인 접수 건을 조회합니다. (개인정보 보호를 위해 일부 정보는 마스킹됩니다)</div>
              </div>

              <div class="field" style="margin-top:6px;">
                <label class="req">휴대폰</label>
                <div class="inline">
                  <span class="prefix">010</span>
                  <input id="phone" placeholder="0000-0000" inputmode="numeric" maxlength="9" />
                  <button id="checkBtn" class="btn btnSquare" type="button" aria-label="조회">확인</button>
                </div>
                <div id="phoneWarn" class="warn">휴대폰 뒤 8자리를 입력해 주세요.</div>
              </div>

              <div id="loading" style="display:none; align-items:center; gap:10px;">
                <div class="spinner"></div>
                <div class="muted" style="font-size:13px;">조회 중…</div>
              </div>

              <div id="result" style="display:none;">
                <div style="font-weight:900; margin-top:6px;">진행 중 접수</div>
                <div id="ticketBtns" class="ticketBtns" style="margin-top:10px;"></div>
                <div id="empty" class="empty" style="display:none;">진행 중인 접수 건이 없습니다.</div>
              </div>
            </div>
          </div>
        </div>
      </section>

      <!-- step 2: detail -->
      <section id="stDetail" class="stage">
        <div class="stack">
          <div class="card">
            <div class="kv">
              <div class="kvRow"><div class="k">접수일자</div><div class="v" id="dDate">-</div></div>
              <div class="kvRow"><div class="k">현재상태</div><div class="v" id="dStatus">-</div></div>
              <div class="kvRow"><div class="k">이름</div><div class="v" id="dName">-</div></div>
              <div class="kvRow"><div class="k">전화번호</div><div class="v" id="dPhone">-</div></div>
              <div class="kvRow"><div class="k">주소</div><div class="v" id="dAddr">-</div></div>
            </div>

            <div style="margin-top:14px; font-weight:900;">등록 품목</div>
            <div id="dItems" class="items"></div>
          </div>

          <!-- unpaid sum (conditional) -->
          <div id="sumCard" class="card sumCard">
            <div style="font-weight:900;">미결제 합계</div>
            <div class="divider"></div>
            <div class="kv">
              <div class="kvRow"><div class="k">합계 금액</div><div class="v" id="sumUnpaid">-</div></div>
            </div>
          </div>
        </div>
      </section>
    </div>

    <!-- detail bottom actions -->
    <div id="detailActions" class="detailActions">
      <div class="detailActionsInner">
        <button id="editBtn" class="btn btnWide" type="button" style="display:none;">수정</button>
        <button id="payBtn" class="btn btnWide primary" type="button" style="display:none;">결제</button>
      </div>
    </div>

    <!-- edit full-screen -->
    <div id="editFull" class="full" aria-hidden="true">
      <div class="fullPage">
        <div class="appbar" style="position:sticky; top:0; background: var(--bg);">
          <div class="appbarRow">
            <button id="editBack" class="back" type="button" aria-label="닫기">←</button>
            <div class="titleWrap"><h1 class="title" style="font-size:18px;">접수 수정</h1></div>
            <div></div>
          </div>
        </div>

        <div class="stack" style="margin-top:10px;">
          <div class="card">
            <div class="field">
              <label class="req">이름</label>
              <input id="eName" placeholder="홍길동" />
            </div>
            <div class="field" style="margin-top:10px;">
              <label>주소</label>
              <input id="eAddrBase" placeholder="기본주소" />
            </div>
            <div class="field" style="margin-top:10px;">
              <label>상세주소</label>
              <input id="eAddrDetail" placeholder="상세주소" />
            </div>
          </div>

          <div class="card">
            <div style="display:flex; justify-content:space-between; align-items:center; gap:10px;">
              <strong style="font-size:14px;">품목</strong>
              <button id="addItem" class="btn" type="button">품목 추가</button>
            </div>
            <div class="divider"></div>
            <div id="eItems" class="list"></div>
          </div>
        </div>
      </div>

      <div class="fullCta">
        <div class="fullCtaInner">
          <button id="saveEdit" class="btn btnWide primary" type="button">저장</button>
        </div>
      </div>
    </div>

    <!-- item editor (same flow as AS 접수) -->
    <div id="itemFull" class="full" aria-hidden="true">
      <div class="fullPage">
        <div class="appbar" style="position:sticky; top:0; background: var(--bg);">
          <div class="appbarRow">
            <button id="itemBack" class="back" type="button" aria-label="뒤로">←</button>
            <div class="titleWrap"><h1 class="title" style="font-size:18px;">품목 정보</h1></div>
            <div></div>
          </div>
        </div>

        <div class="stack" style="margin-top:10px;">
          <div class="card">
            <div class="row">
              <div class="field" style="flex:1;">
                <label class="req">제품명</label>
                <input id="pName" placeholder="예: ABKO XXX" />
              </div>
              <div class="field" style="max-width:120px;">
                <label class="req">수량</label>
                <input id="pQty" value="1" inputmode="numeric" />
              </div>
            </div>
            <div class="field" style="margin-top:10px;">
              <label class="req">증상 상세</label>
              <textarea id="pSym" placeholder="증상, 발생 조건, 재현 방법"></textarea>
            </div>
          </div>
        </div>
      </div>

      <div class="fullCta">
        <div class="fullCtaInner">
          <button id="saveItem" class="btn btnWide primary" type="button">품목 저장</button>
        </div>
      </div>
    </div>

    <script>
      const bar = document.getElementById('bar');
      const tabs = document.getElementById('tabs');
      const backBtn = document.getElementById('backBtn');

      const stPhone = document.getElementById('stPhone');
      const stDetail = document.getElementById('stDetail');

      const phoneEl = document.getElementById('phone');
      const checkBtn = document.getElementById('checkBtn');
      const phoneWarn = document.getElementById('phoneWarn');
      const loading = document.getElementById('loading');
      const result = document.getElementById('result');
      const ticketBtns = document.getElementById('ticketBtns');
      const empty = document.getElementById('empty');

      const dDate = document.getElementById('dDate');
      const dStatus = document.getElementById('dStatus');
      const dName = document.getElementById('dName');
      const dPhone = document.getElementById('dPhone');
      const dAddr = document.getElementById('dAddr');
      const dItems = document.getElementById('dItems');

      const sumCard = document.getElementById('sumCard');
      const sumUnpaid = document.getElementById('sumUnpaid');

      const detailActions = document.getElementById('detailActions');
      const editBtn = document.getElementById('editBtn');
      const payBtn = document.getElementById('payBtn');

      const editFull = document.getElementById('editFull');
      const editBack = document.getElementById('editBack');
      const saveEdit = document.getElementById('saveEdit');
      const eName = document.getElementById('eName');
      const eAddrBase = document.getElementById('eAddrBase');
      const eAddrDetail = document.getElementById('eAddrDetail');
      const eItems = document.getElementById('eItems');
      const addItemBtn = document.getElementById('addItem');

      const itemFull = document.getElementById('itemFull');
      const itemBack = document.getElementById('itemBack');
      const saveItem = document.getElementById('saveItem');
      const pName = document.getElementById('pName');
      const pQty = document.getElementById('pQty');
      const pSym = document.getElementById('pSym');

      let tickets = [];
      let selectedIdx = 0;
      const openItemSet = new Set();

      function digitsOnly(s){ return (s||'').replace(/\D/g,''); }
      function formatPhone8(raw){
        const d = digitsOnly(raw).slice(0,8);
        if(d.length <= 4) return d;
        return `${d.slice(0,4)}-${d.slice(4)}`;
      }
      function isValidPhone8(v){ return digitsOnly(v).length === 8; }

      function maskName(name){
        const s = (name||'').trim();
        if(s.length <= 1) return '*';
        if(s.length === 2) return s[0] + '*';
        return s[0] + '*'.repeat(s.length-2) + s[s.length-1];
      }
      function maskPhone(full010){
        // show only last 2 digits
        const d = digitsOnly(full010);
        const last2 = d.slice(-2);
        return '*'.repeat(Math.max(0, d.length-2)) + last2;
      }
      function maskAddr(base, detail){
        const b = (base||'').trim();
        const d = (detail||'').trim();
        const maskedDetail = d ? '*'.repeat(Math.min(8, Math.max(3, d.length))) : '';
        return [b, maskedDetail].filter(Boolean).join(' ');
      }

      function setStage(detail){
        stPhone.classList.toggle('active', !detail);
        stDetail.classList.toggle('active', !!detail);
        tabs.style.display = detail ? 'flex' : 'none';
        bar.style.width = detail ? '66%' : '33%';
        detailActions.style.display = detail ? 'block' : 'none';
        window.scrollTo({top:0, behavior:'instant'});
      }

      // back behavior: detail -> list/phone, phone -> main page
      backBtn.addEventListener('click', ()=>{
        if(stDetail.classList.contains('active')){
          setStage(false);
          // keep results visible if already fetched
          if(tickets.length){ result.style.display = 'block'; }
          return;
        }
        history.back();
      });

      function renderTicketBtns(){
        ticketBtns.innerHTML = '';
        empty.style.display = tickets.length ? 'none' : 'block';
        tickets.forEach((t, idx)=>{
          const b = document.createElement('button');
          b.type = 'button';
          b.className = 'ticketBtn';
          b.innerHTML = `<strong>${t.no}</strong><span>${t.createdAt}</span>`;
          b.addEventListener('click', ()=>{
            selectedIdx = idx;
            renderTabs();
            renderDetail();
            setStage(true);
          });
          ticketBtns.appendChild(b);
        });
      }

      function renderTabs(){
        tabs.innerHTML = '';
        tickets.forEach((t, idx)=>{
          const el = document.createElement('button');
          el.type = 'button';
          el.className = 'tab' + (idx===selectedIdx ? ' active' : '');
          el.innerHTML = `<strong>${t.no}</strong><span>${t.createdAt}</span>`;
          el.addEventListener('click', ()=>{
            selectedIdx = idx;
            openItemSet.clear();
            renderTabs();
            renderDetail();
          });
          tabs.appendChild(el);
        });
      }

      function renderDetail(){
        const t = tickets[selectedIdx];
        if(!t) return;
        dDate.textContent = t.createdAt;
        dStatus.textContent = t.status;
        dName.textContent = maskName(t.name);
        dPhone.textContent = maskPhone(t.phone);
        dAddr.textContent = maskAddr(t.addrBase, t.addrDetail);

        // edit/pay buttons
        editBtn.style.display = t.canEdit ? 'block' : 'none';
        payBtn.style.display = t.unpaidAmount > 0 ? 'block' : 'none';

        dItems.innerHTML = '';

        let totalUnpaid = 0;
        t.items.forEach((it, idx)=>{
          const itemUnpaid = Number(it.unpaidAmount || 0);
          totalUnpaid += itemUnpaid;
          const box = document.createElement('div');
          box.className = 'it' + (openItemSet.has(idx) ? ' open' : '');

          const analysis = (it.analysis || '').trim();
          const plan = (it.plan || '').trim();
          const hasDetail = !!analysis || !!plan || itemUnpaid > 0;

          box.innerHTML = `
            <div class="itTop">
              <div style="display:flex; flex-direction:column; gap:8px;">
                <span class="itStatus">${(it.itemStatus || t.status) }</span>
                <strong>${it.name}</strong>
              </div>
              <span>${it.qty}개</span>
            </div>
            <div class="itSym">${it.symptom}</div>
            ${hasDetail ? `
              <div class="itDetail">
                <div class="row2">
                  <div class="kvRow"><div class="k">분석내용</div><div class="v">${analysis || '-'}</div></div>
                  <div class="kvRow"><div class="k">AS조치 방안</div><div class="v">${plan || '-'}</div></div>
                  <div class="kvRow"><div class="k">미결제 금액</div><div class="v">${itemUnpaid ? itemUnpaid.toLocaleString()+'원' : '-'}</div></div>
                </div>
              </div>
            ` : ''}
          `;

          box.addEventListener('click', ()=>{
            // toggle this item only (multi-open)
            if(openItemSet.has(idx)) openItemSet.delete(idx);
            else openItemSet.add(idx);
            renderDetail();
          });
          dItems.appendChild(box);
        });

        // unpaid sum card
        sumCard.style.display = totalUnpaid > 0 ? 'block' : 'none';
        if(totalUnpaid > 0) sumUnpaid.textContent = `${totalUnpaid.toLocaleString()}원`;
      }

      function mockFetchTickets(phone8){
        // 진행중(미완료)만
        const basePhone = '010-' + formatPhone8(phone8);
        const nowY = new Date().getFullYear();
        return [
          {
            no: `CS-${nowY}-1482`,
            createdAt: `${nowY}-04-18`,
            status: '접수완료(처리중)',
            canEdit: false,
            unpaidAmount: 0,
            name: '홍길동',
            phone: basePhone,
            addrBase: '서울특별시 강남구 테헤란로 123',
            addrDetail: '101동 1203호',
            items: [
              { name:'ABKO 키보드 K', qty:1, symptom:'키 입력이 간헐적으로 씹힘', analysis:'점검 대기', plan:'센터 입고 후 확인 예정', unpaidAmount:0 },
              { name:'ABKO 마우스 M', qty:2, symptom:'휠 튐 현상 발생', itemStatus:'접수완료(처리중)', analysis:'점검 대기', plan:'센터 입고 후 확인 예정', unpaidAmount:0 },
            ]
          },
          {
            no: `CS-${nowY}-1539`,
            createdAt: `${nowY}-04-19`,
            status: '기사 배정(처리중)',
            canEdit: true,
            analysis: '증상 확인 결과 스위치/휠 모듈 이상 가능성이 높음',
            plan: '무상 점검 후 부품 교체(필요 시 유상 안내)',
            unpaidAmount: 12000,
            name: '김철수',
            phone: basePhone,
            addrBase: '경기도 성남시 분당구 판교로 456',
            addrDetail: 'B동 502호',
            items: [
              { name:'ABKO 케이스 C', qty:1, symptom:'전원 버튼이 작동하지 않음', itemStatus:'증상확인완료', analysis:'버튼 불량 의심', plan:'스위치 교체', unpaidAmount:12000 },
            ]
          }
        ];
      }

      // ===== edit flow =====
      const iconPencil = `<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zm2.92 2.33H5v-.92l9.06-9.06.92.92L5.92 19.58zM20.71 7.04a1.003 1.003 0 0 0 0-1.42l-2.34-2.34a1.003 1.003 0 0 0-1.42 0l-1.83 1.83 3.75 3.75 1.84-1.82z"/></svg>`;
      const iconTrash = `<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6 7h12l-1 14H7L6 7zm3-3h6l1 2H8l1-2z"/></svg>`;

      let editingItems = [];
      let editingItemIndex = -1;

      function openEdit(){
        const t = tickets[selectedIdx];
        if(!t || !t.canEdit) return;
        eName.value = t.name || '';
        eAddrBase.value = t.addrBase || '';
        eAddrDetail.value = t.addrDetail || '';
        editingItems = (t.items || []).map(x=>({ ...x }));
        renderEditItems();
        editFull.classList.add('show');
        editFull.setAttribute('aria-hidden','false');
      }

      function closeEdit(){
        editFull.classList.remove('show');
        editFull.setAttribute('aria-hidden','true');
      }

      function renderEditItems(){
        eItems.innerHTML = '';
        if(!editingItems.length){
          const empty = document.createElement('div');
          empty.className = 'muted small';
          empty.textContent = '등록된 품목이 없습니다. “품목 추가”를 눌러주세요.';
          eItems.appendChild(empty);
          return;
        }
        editingItems.forEach((it, idx)=>{
          const el = document.createElement('div');
          el.className = 'item';
          el.innerHTML = `
            <div class="itemTop">
              <div style="flex:1; min-width:0;">
                <div class="itemHeaderRow">
                  <strong class="itemName">${it.name}</strong>
                  <span class="itemQty">${it.qty}개</span>
                </div>
                <div class="itemMeta">${it.symptom || ''}</div>
              </div>
              <div class="itemActions">
                <button class="iconBtn" type="button" data-act="edit" data-idx="${idx}" aria-label="수정">${iconPencil}</button>
                <button class="iconBtn danger" type="button" data-act="remove" data-idx="${idx}" aria-label="삭제">${iconTrash}</button>
              </div>
            </div>
          `;
          eItems.appendChild(el);
        });
      }

      eItems.addEventListener('click', (e)=>{
        const btn = e.target.closest('button');
        if(!btn) return;
        const act = btn.getAttribute('data-act');
        const idx = Number(btn.getAttribute('data-idx'));
        if(act==='edit') return openItemFull(idx);
        if(act==='remove'){
          editingItems.splice(idx,1);
          renderEditItems();
        }
      });

      function openItemFull(idx=-1){
        editingItemIndex = idx;
        if(idx >= 0){
          const it = editingItems[idx];
          pName.value = it.name || '';
          pQty.value = String(it.qty || 1);
          pSym.value = it.symptom || '';
        } else {
          pName.value = '';
          pQty.value = '1';
          pSym.value = '';
        }
        itemFull.classList.add('show');
        itemFull.setAttribute('aria-hidden','false');
        pName.focus();
      }

      function closeItemFull(){
        itemFull.classList.remove('show');
        itemFull.setAttribute('aria-hidden','true');
      }

      addItemBtn.addEventListener('click', ()=>openItemFull(-1));
      itemBack.addEventListener('click', closeItemFull);
      editBack.addEventListener('click', closeEdit);

      saveItem.addEventListener('click', ()=>{
        const name = pName.value.trim();
        const sym = pSym.value.trim();
        const qty = Math.max(1, parseInt(pQty.value||'1',10) || 1);
        if(!name){ pName.classList.add('error'); pName.focus(); return; }
        if(!sym){ pSym.classList.add('error'); pSym.focus(); return; }
        pName.classList.remove('error');
        pSym.classList.remove('error');

        const payload = { name, qty, symptom: sym };
        if(editingItemIndex >= 0) editingItems[editingItemIndex] = payload;
        else editingItems.push(payload);
        closeItemFull();
        renderEditItems();
      });

      saveEdit.addEventListener('click', ()=>{
        const t = tickets[selectedIdx];
        if(!t || !t.canEdit) return;
        if(!eName.value.trim()){ eName.classList.add('error'); eName.focus(); return; }
        eName.classList.remove('error');
        t.name = eName.value.trim();
        t.addrBase = eAddrBase.value.trim();
        t.addrDetail = eAddrDetail.value.trim();
        t.items = editingItems.map(x=>({ ...x }));
        closeEdit();
        renderTabs();
        renderDetail();
      });

      editBtn.addEventListener('click', openEdit);
      payBtn.addEventListener('click', ()=>{
        alert('결제 플로우는 UI mock 단계입니다.');
      });

      phoneEl.addEventListener('input', ()=>{
        phoneEl.value = formatPhone8(phoneEl.value);
        phoneWarn.classList.remove('show');

        const filled = digitsOnly(phoneEl.value).length > 0;
        phoneEl.classList.toggle('hiMint', filled);
        checkBtn.classList.toggle('mint', filled);
      });

      checkBtn.addEventListener('click', ()=>{
        if(!isValidPhone8(phoneEl.value)){
          phoneWarn.classList.add('show');
          phoneEl.classList.add('error');
          phoneEl.focus();
          return;
        }
        phoneEl.classList.remove('error');
        phoneWarn.classList.remove('show');

        loading.style.display = 'flex';
        result.style.display = 'none';

        // mock loading
        setTimeout(()=>{
          tickets = mockFetchTickets(phoneEl.value);
          loading.style.display = 'none';
          result.style.display = 'block';
          renderTicketBtns();
          bar.style.width = '33%';
        }, 900);
      });

      // init
      bar.style.width = '33%';
    </script>
  </body>
</html>
