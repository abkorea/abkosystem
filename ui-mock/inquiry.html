<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ABKO 고객지원 - 문의 접수</title>
    <link rel="stylesheet" href="./_style.css" />
    <style>
      :root{ --pageMax: 460px; }
      body{ background: var(--bg); }

      .page{ max-width: var(--pageMax); margin: 0 auto; padding: 0 14px 120px; }

      /* 브랜드 고정 헤더 (AS 접수 스타일과 통일) */
      .brandHeader{ position:sticky; top:0; z-index:20; background: rgba(242,244,247,.95); backdrop-filter:blur(8px); padding:12px 0 0; }
      .brandHeaderRow{ display:grid; grid-template-columns:38px 1fr 38px; align-items:center; padding:0 14px; }
      .brandHeader .bTitle{ margin:0; font-size:18px; font-weight:900; letter-spacing:-.5px; text-align:center; }
      .back{ width:38px; height:38px; border-radius:12px; border:1px solid var(--line); background:#fff; display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:16px; }
      .back:active{ transform:translateY(1px); }

      .progressWrap{ margin-top:8px; padding: 0 14px 10px; }
      .progress{ height:6px; background:#eaf0f7; border-radius:999px; overflow:hidden; border:1px solid var(--line); }
      .bar{ height:100%; width:0%; background: var(--accent); border-radius:999px; transition: width .25s ease; }

      label{ font-size:14px; }
      label.req{ font-weight:900; color: var(--text); }
      label.req::after{ content:' *'; color:var(--bad); font-size:12px; }

      .hint{ font-size:13px; color:var(--muted); margin-top:4px; }
      .warn{ margin-top:6px; font-size:12px; color:var(--bad); display:none; }
      .warn.show{ display:block; }

      .stack{ display:grid; gap:12px; margin-top:14px; }

      .card{ background:#fff; border:1px solid var(--line); border-radius:18px; padding:16px; box-shadow: var(--shadow); }

      .field{ display:flex; flex-direction:column; gap:6px; }

      select{
        background:#ffffff;
        border:1px solid var(--line);
        border-radius:10px;
        padding:10px 10px;
        color:var(--text);
        outline:none;
        font-size:15px;
        appearance:auto;
      }
      select:focus{ border-color:var(--accent); border-width:2px; padding:9px 9px; }

      /* CTA 하단 고정 */
      .cta{ position:fixed; left:0; right:0; bottom:0; background: var(--bg); padding:12px 0 14px; }
      .ctaInner{ max-width: var(--pageMax); margin:0 auto; padding:0 14px; }

      .btnWide{ width:100%; padding:15px 14px; border-radius:16px; font-weight:900; letter-spacing:-.2px; }
      .btnWide.primary{ background:var(--accent); border-color:var(--accent); color:#fff; }
      .btnWide.is-disabled{ cursor:not-allowed; background:#e5e7eb; border-color:#e5e7eb; color:#111827; }

      /* full-screen consent */
      .full{ position:fixed; inset:0; display:none; background: var(--bg); z-index: 50; }
      .full.show{ display:flex; flex-direction:column; }
      .fullPage{ max-width: var(--pageMax); margin:0 auto; padding: 12px 14px 120px; overflow-y:auto; flex:1; -webkit-overflow-scrolling:touch; }
      .fullCta{ position:fixed; left:0; right:0; bottom:0; background: var(--bg); padding:12px 0 14px; }
      .fullCtaInner{ max-width: var(--pageMax); margin:0 auto; padding:0 14px; }

      /* 완료 화면 */
      .doneWrap{ display:none; flex-direction:column; align-items:center; justify-content:center; min-height:60vh; text-align:center; gap:16px; padding:20px 14px; }
      .doneWrap.show{ display:flex; }
      .doneIcon{ font-size:52px; }
      .doneTitle{ margin:0; font-size:22px; font-weight:900; letter-spacing:-.6px; }
      .doneDesc{ margin:0; color:var(--muted); font-size:14px; line-height:1.6; }
      .doneNo{ background:#fff; border:1px solid var(--line); border-radius:14px; padding:12px 20px; font-size:13px; color:var(--muted); }
      .doneNo strong{ display:block; font-size:18px; color:var(--text); margin-top:4px; letter-spacing:.5px; }
    </style>
  </head>
  <body>

    <!-- 항상 고정 브랜드 헤더 -->
    <div class="brandHeader">
      <div class="brandHeaderRow">
        <button class="back" type="button" onclick="history.back()" aria-label="뒤로">←</button>
        <h1 class="bTitle">ABKO 고객지원</h1>
        <div></div>
      </div>
      <div class="progressWrap">
        <div class="progress"><div id="bar" class="bar"></div></div>
      </div>
    </div>

    <!-- 폼 영역 -->
    <div class="page" id="formWrap">
      <div class="stack">

        <div class="card">
          <div class="field">
            <label class="req">이름</label>
            <input id="inqName" type="text" placeholder="이름을 입력해 주세요" />
            <div id="nameWarn" class="warn">이름을 입력해 주세요.</div>
          </div>
        </div>

        <div class="card">
          <div class="field">
            <label class="req">연락처</label>
            <div style="display:flex; gap:8px; align-items:center;">
              <span style="padding:10px 12px; background:#f3f4f6; border:1px solid var(--line); border-radius:10px; font-size:15px; font-weight:700; white-space:nowrap; color:var(--text);">010</span>
              <input id="inqPhone" type="tel" inputmode="numeric" placeholder="0000-0000" maxlength="9" style="flex:1;" />
            </div>
            <div id="phoneWarn" class="warn">올바른 연락처를 입력해 주세요.</div>
          </div>
        </div>

        <div class="card">
          <div class="field">
            <label>이메일(선택)</label>
            <input id="inqEmail" type="email" placeholder="example@email.com" />
            <div id="emailWarn" class="warn">이메일 형식이 올바르지 않습니다.</div>
          </div>
        </div>

        <div class="card">
          <div class="field">
            <label class="req">문의 항목</label>
            <select id="inqCategory">
              <option value="">문의 유형을 선택해 주세요</option>
              <option value="product">제품 문의</option>
              <option value="as">AS / 수리 문의</option>
              <option value="delivery">배송 문의</option>
              <option value="exchange">교환 / 환불</option>
              <option value="purchase">구매 문의</option>
              <option value="etc">기타</option>
            </select>
            <div id="catWarn" class="warn">문의 유형을 선택해 주세요.</div>
          </div>
        </div>

        <div class="card">
          <div class="field">
            <label class="req">문의 내용</label>
            <textarea id="inqContent" rows="6" placeholder="문의하실 내용을 자세히 입력해 주세요."></textarea>
            <div id="contentWarn" class="warn">문의 내용을 입력해 주세요.</div>
          </div>
        </div>

        <div class="card">
          <div style="display:flex; align-items:center; justify-content:space-between; gap:10px;">
            <strong style="font-size:14px;">동의</strong>
          </div>
          <div class="divider"></div>

          <div style="display:flex; align-items:flex-start; justify-content:space-between; gap:10px;">
            <label style="display:flex; gap:10px; align-items:flex-start; cursor:pointer; flex:1;">
              <input id="consentRequired" type="checkbox" style="margin-top:2px;" />
              <div>
                <div style="font-weight:900;">(필수) 이용약관 동의</div>
                <div class="muted small" style="margin-top:2px;">문의 접수 처리를 위해 필요합니다.</div>
              </div>
            </label>
            <button id="termsViewBtn" class="btn" type="button" style="padding:8px 10px; border-radius:12px;">내용보기</button>
          </div>

          <div style="margin-top:10px; display:flex; align-items:flex-start; justify-content:space-between; gap:10px;">
            <label style="display:flex; gap:10px; align-items:flex-start; cursor:pointer; flex:1;">
              <input id="consentThird" type="checkbox" style="margin-top:2px;" />
              <div>
                <div style="font-weight:900;">(필수) 제3자 정보 제공 동의</div>
                <div class="muted small" style="margin-top:2px;">문의 처리 및 안내를 위해 필요합니다.</div>
              </div>
            </label>
            <button id="thirdViewBtn" class="btn" type="button" style="padding:8px 10px; border-radius:12px;">내용보기</button>
          </div>

          <div id="consentWarn" class="warn">필수 약관 동의가 필요합니다.</div>
        </div>

      </div>
    </div>

    <!-- 완료 화면 -->
    <div class="doneWrap" id="doneWrap">
      <div class="doneIcon">✅</div>
      <h2 class="doneTitle">문의가 접수되었습니다</h2>
      <p class="doneDesc">빠른 시일 내에 등록하신 연락처로<br>답변 드리겠습니다.</p>
      <div class="doneNo">
        접수 번호
        <strong id="doneNo">-</strong>
      </div>
    </div>

    <!-- 하단 고정 버튼 -->
    <div class="cta" id="ctaBar">
      <div class="ctaInner">
        <button id="submitBtn" class="btn btnWide primary is-disabled" type="button">문의 접수하기</button>
      </div>
    </div>

    <!-- 약관 내용 보기 -->
    <div id="consentFull" class="full" aria-hidden="true">
      <div class="fullPage">
        <div class="appbar" style="position:sticky; top:0; background: var(--bg);">
          <div class="appbarRow" style="display:grid; grid-template-columns:38px 1fr 38px; align-items:center; gap:10px;">
            <button id="consentBack" class="back" type="button" aria-label="뒤로">←</button>
            <div class="titleWrap" style="text-align:center;"><h1 id="consentTitle" class="title" style="margin:0; font-size:18px; font-weight:900;">약관</h1></div>
            <div></div>
          </div>
        </div>

        <div class="stack" style="margin-top:10px;">
          <div class="card">
            <div id="consentBody" class="muted" style="font-size:13px; line-height:1.65; white-space:pre-line;"></div>
          </div>
        </div>
      </div>

      <div class="fullCta">
        <div class="fullCtaInner" style="padding:0 14px;">
          <button id="consentAgree" class="btn btnWide primary" type="button">동의하기</button>
        </div>
      </div>
    </div>

    <script>
      const inqName     = document.getElementById('inqName');
      const inqPhone    = document.getElementById('inqPhone');
      const inqEmail    = document.getElementById('inqEmail');
      const inqCategory = document.getElementById('inqCategory');
      const inqContent  = document.getElementById('inqContent');
      const submitBtn   = document.getElementById('submitBtn');
      const bar         = document.getElementById('bar');

      const consentRequired = document.getElementById('consentRequired');
      const consentThird = document.getElementById('consentThird');
      const consentWarn = document.getElementById('consentWarn');
      const termsViewBtn = document.getElementById('termsViewBtn');
      const thirdViewBtn = document.getElementById('thirdViewBtn');
      const consentFull = document.getElementById('consentFull');
      const consentBack = document.getElementById('consentBack');
      const consentAgree = document.getElementById('consentAgree');
      const consentTitle = document.getElementById('consentTitle');
      const consentBody = document.getElementById('consentBody');
      let consentTarget = 'terms';
      const formWrap    = document.getElementById('formWrap');
      const doneWrap    = document.getElementById('doneWrap');
      const ctaBar      = document.getElementById('ctaBar');

      function digitsOnly(s){ return (s||'').replace(/\D/g,''); }
      function formatPhone(raw){
        const d = digitsOnly(raw).slice(0,8);
        if(d.length <= 4) return d;
        return `${d.slice(0,4)}-${d.slice(4)}`;
      }
      function isValidPhone(v){
        return digitsOnly(v).length === 8;
      }

      function isValidEmail(v){
        if(!v) return true;
        return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v);
      }

      function setEmailState(){
        const ok = isValidEmail(inqEmail.value.trim());
        inqEmail.classList.toggle('error', !ok);
        document.getElementById('emailWarn').classList.toggle('show', !ok);
        return ok;
      }

      function setNameState(){
        const ok = !!inqName.value.trim();
        inqName.classList.toggle('error', !ok);
        document.getElementById('nameWarn').classList.toggle('show', !ok);
        return ok;
      }

      function setPhoneState(){
        const ok = isValidPhone(inqPhone.value);
        inqPhone.classList.toggle('error', !ok);
        document.getElementById('phoneWarn').classList.toggle('show', !ok);
        return ok;
      }

      function setCatState(){
        const ok = !!inqCategory.value;
        inqCategory.classList.toggle('error', !ok);
        document.getElementById('catWarn').classList.toggle('show', !ok);
        return ok;
      }

      function setContentState(){
        const ok = !!inqContent.value.trim();
        inqContent.classList.toggle('error', !ok);
        document.getElementById('contentWarn').classList.toggle('show', !ok);
        return ok;
      }

      function setConsentState(){
        const ok = !!consentRequired.checked && !!consentThird.checked;
        consentWarn.classList.toggle('show', !ok);
        return ok;
      }

      function updateProgress(){
        const checks = [
          !!inqName.value.trim(),
          digitsOnly(inqPhone.value).length === 8,
          !!inqCategory.value,
          !!inqContent.value.trim(),
          !!consentRequired.checked,
          !!consentThird.checked,
        ];
        const filled = checks.filter(Boolean).length;
        const pct = Math.round((filled / checks.length) * 100);
        bar.style.width = `${pct}%`;
      }

      function validate(){
        const ok = setNameState() &&
                   setPhoneState() &&
                   setCatState() &&
                   setContentState() &&
                   setEmailState() &&
                   setConsentState();
        submitBtn.classList.toggle('is-disabled', !ok);
        updateProgress();
        return !!ok;
      }

      // 실시간(입력) + 포커스 이동(blur) 시 오류 하이라이트 자동 제거
      inqName.addEventListener('input', validate);
      inqName.addEventListener('blur', validate);

      inqCategory.addEventListener('change', validate);
      inqCategory.addEventListener('blur', validate);

      inqContent.addEventListener('input', validate);
      inqContent.addEventListener('blur', validate);

      inqEmail.addEventListener('input', validate);
      inqEmail.addEventListener('blur', validate);

      inqPhone.addEventListener('input', ()=>{
        inqPhone.value = formatPhone(inqPhone.value);
        validate();
      });
      inqPhone.addEventListener('blur', validate);

      consentRequired.addEventListener('change', validate);
      consentThird.addEventListener('change', validate);

      // consent modal
      const CONSENT_TEXT = {
        terms: {
          title: '이용약관',
          body: `제1조(목적)\n본 약관은 문의 접수 서비스 이용과 관련한 기본 사항을 규정합니다.\n\n제2조(수집 항목)\n이름, 연락처, 이메일(선택), 문의 항목/내용\n\n제3조(보유 기간)\n처리 완료 후 관련 법령 또는 내부 정책에 따른 기간 보관\n\n동의를 거부할 권리가 있으나, 동의하지 않을 경우 문의 접수가 제한될 수 있습니다.`
        },
        third: {
          title: '제3자 정보 제공 동의',
          body: `제공받는 자: 고객지원 처리 협력사(콜센터/배송사 등)\n제공 목적: 문의 처리 및 안내\n제공 항목: 이름, 연락처, 문의 내용(필요 최소)\n보유/이용 기간: 목적 달성 후 지체 없이 파기(법령/정책에 따라 예외 가능)\n\n동의를 거부할 권리가 있으나, 동의하지 않을 경우 문의 접수가 제한될 수 있습니다.`
        }
      };

      function openConsent(type){
        consentTarget = type;
        const t = CONSENT_TEXT[type];
        consentTitle.textContent = t.title;
        consentBody.textContent = t.body;
        consentFull.classList.add('show');
        consentFull.setAttribute('aria-hidden','false');
      }
      function closeConsent(){
        consentFull.classList.remove('show');
        consentFull.setAttribute('aria-hidden','true');
      }
      termsViewBtn.addEventListener('click', ()=>openConsent('terms'));
      thirdViewBtn.addEventListener('click', ()=>openConsent('third'));
      consentBack.addEventListener('click', closeConsent);
      consentAgree.addEventListener('click', ()=>{
        if(consentTarget === 'terms') consentRequired.checked = true;
        if(consentTarget === 'third') consentThird.checked = true;
        validate();
        closeConsent();
      });

      submitBtn.addEventListener('click', ()=>{
        if(submitBtn.classList.contains('is-disabled')){
          validate();
          if(!consentRequired.checked || !consentThird.checked) consentRequired.scrollIntoView({behavior:'smooth', block:'center'});
          return;
        }
        // 유효성 검사 + 오류 포커싱
        let focusDone = false;
        function tryFocus(el, warnId){
          el.classList.add('error');
          document.getElementById(warnId).classList.add('show');
          if(!focusDone){ el.scrollIntoView({behavior:'smooth', block:'center'}); setTimeout(()=>el.focus({preventScroll:true}),50); focusDone=true; }
        }
        function clearErr(el, warnId){
          el.classList.remove('error');
          document.getElementById(warnId).classList.remove('show');
        }

        if(!inqName.value.trim()) tryFocus(inqName,'nameWarn'); else clearErr(inqName,'nameWarn');
        if(!isValidPhone(inqPhone.value)) tryFocus(inqPhone,'phoneWarn'); else clearErr(inqPhone,'phoneWarn');
        if(!isValidEmail(inqEmail.value.trim())) tryFocus(inqEmail,'emailWarn'); else clearErr(inqEmail,'emailWarn');
        if(!inqCategory.value) tryFocus(inqCategory,'catWarn'); else clearErr(inqCategory,'catWarn');
        if(!inqContent.value.trim()) tryFocus(inqContent,'contentWarn'); else clearErr(inqContent,'contentWarn');

        if(focusDone) return;

        // 접수 완료
        const no = `QNA-${new Date().getFullYear()}-${String(Math.floor(Math.random()*9000)+1000)}`;
        document.getElementById('doneNo').textContent = no;
        formWrap.style.display = 'none';
        ctaBar.style.display = 'none';
        doneWrap.classList.add('show');
        window.scrollTo({top:0, behavior:'instant'});
      });
    </script>
  </body>
</html>
